<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Ethereal Ledger - Admin Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#ae8dff",
                    "primary": "#ba9eff",
                    "on-secondary-container": "#e2c5ff",
                    "surface-container-lowest": "#000000",
                    "secondary": "#d6b2fc",
                    "secondary-container": "#573878",
                    "on-primary-container": "#2b006e",
                    "error": "#ff6e84",
                    "on-error-container": "#ffb2b9",
                    "surface-variant": "#192540",
                    "surface-dim": "#060e20",
                    "on-tertiary-fixed-variant": "#006544",
                    "primary-container": "#ae8dff",
                    "tertiary-container": "#69f6b8",
                    "secondary-fixed-dim": "#d9b5ff",
                    "surface-container": "#0f1930",
                    "on-surface-variant": "#a3aac4",
                    "error-dim": "#d73357",
                    "tertiary": "#9bffce",
                    "on-secondary": "#4c2e6d",
                    "inverse-surface": "#faf8ff",
                    "on-primary": "#39008c",
                    "surface-container-high": "#141f38",
                    "primary-dim": "#8455ef",
                    "primary-fixed-dim": "#a27cff",
                    "surface-container-highest": "#192540",
                    "on-primary-fixed": "#000000",
                    "surface": "#060e20",
                    "surface-bright": "#1f2b49",
                    "on-surface": "#dee5ff",
                    "tertiary-fixed-dim": "#58e7ab",
                    "tertiary-dim": "#58e7ab",
                    "on-tertiary-container": "#005a3c",
                    "background": "#060e20",
                    "tertiary-fixed": "#69f6b8",
                    "surface-tint": "#ba9eff",
                    "surface-container-low": "#091328",
                    "inverse-on-surface": "#4d556b",
                    "on-tertiary-fixed": "#00452d",
                    "on-secondary-fixed-variant": "#614283",
                    "error-container": "#a70138",
                    "outline": "#6d758c",
                    "on-background": "#dee5ff",
                    "outline-variant": "#40485d",
                    "on-tertiary": "#006443",
                    "secondary-dim": "#c8a5ed",
                    "inverse-primary": "#6e3bd7",
                    "on-secondary-fixed": "#432564",
                    "on-error": "#490013",
                    "secondary-fixed": "#e3c6ff",
                    "on-primary-fixed-variant": "#370086"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060e20;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .headline-font { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .ethereal-bg {
            background: radial-gradient(circle at 20% 30%, #192540 0%, #060e20 100%);
        }
        
        .floating-shape-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(132, 85, 239, 0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            filter: blur(60px);
        }
        
        .floating-shape-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(186, 158, 255, 0.1) 0%, transparent 70%);
            bottom: 50px; right: -50px;
            filter: blur(50px);
        }

        .glass-card {
            background: rgba(31, 43, 73, 0.6);
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 64px -15px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(186, 158, 255, 0.3);
        }
    </style>
</head>
<body class="ethereal-bg flex min-h-screen items-center justify-center p-6 relative">
<!-- Background Ethereal Shapes -->
<div class="absolute floating-shape-1 rounded-full pointer-events-none"></div>
<div class="absolute floating-shape-2 rounded-full pointer-events-none"></div>
<div class="absolute top-1/4 right-1/4 w-96 h-96 bg-primary-dim/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Main Content Shell -->
<main class="w-full max-w-lg z-10">
<!-- Brand Identity -->
<header class="mb-12 text-center">
<div class="flex justify-center mb-6">
<div class="p-4 bg-surface-container rounded-lg border border-outline-variant/15">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<h1 class="headline-font text-4xl font-extrabold tracking-tight text-on-surface mb-2">
                Finzo <span class="text-primary-fixed">Admin</span>
</h1>
<p class="text-on-surface-variant font-body">The Ethereal Ledger Control Center</p>
</header>
<!-- Glassmorphic Login Card -->
<section class="glass-card p-10 rounded-lg border border-outline-variant/10">
<form class="space-y-8">
<!-- Email Field -->
<div class="space-y-3">
<label class="headline-font text-on-surface font-semibold text-sm tracking-wide block uppercase">Administrator Email</label>
<div class="relative group input-glow rounded-md transition-all duration-300">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-highest border-none text-on-surface py-5 pl-14 pr-6 rounded-md focus:ring-0 placeholder:text-outline/50 font-body transition-colors" placeholder="admin@etherealledger.io" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-3">
<label class="headline-font text-on-surface font-semibold text-sm tracking-wide block uppercase">Secure Password</label>
<div class="relative group input-glow rounded-md transition-all duration-300">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="password">password</span>
<input class="w-full bg-surface-container-highest border-none text-on-surface py-5 pl-14 pr-6 rounded-md focus:ring-0 placeholder:text-outline/50 font-body transition-colors" placeholder="••••••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Authenticate Button -->
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-dim text-on-primary-fixed headline-font font-bold text-lg rounded-xl shadow-[0_12px_32px_-8px_rgba(132,85,239,0.5)] active:scale-[0.97] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</button>
</form>
<!-- Secondary Links -->
<footer class="mt-10 flex flex-col items-center gap-4">
<a class="text-on-surface-variant hover:text-primary-fixed text-sm font-medium transition-colors border-b border-transparent hover:border-primary-fixed pb-0.5" href="#">
                    Forgot Admin Credentials?
                </a>
<div class="h-px w-8 bg-outline-variant/30"></div>
<a class="flex items-center gap-2 text-on-surface-variant/80 hover:text-tertiary text-sm font-medium transition-colors" href="#">
<span class="material-symbols-outlined text-sm" data-icon="support_agent">support_agent</span>
                    System Support
                </a>
</footer>
</section>
<!-- Security Badge -->
<div class="mt-12 flex justify-center items-center gap-6 opacity-40 grayscale hover:opacity-100 hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="shield">shield</span>
<span class="text-[10px] font-bold tracking-widest text-on-surface uppercase">AES-256 Encrypted</span>
</div>
<div class="h-1 w-1 bg-outline-variant rounded-full"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="security">security</span>
<span class="text-[10px] font-bold tracking-widest text-on-surface uppercase">Multi-Factor Active</span>
</div>
</div>
</main>
<!-- Visual Embellishment: Digital Curator Aesthetic -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/2 left-10 w-24 h-24 border border-outline-variant/10 rounded-lg rotate-12"></div>
<div class="absolute bottom-20 right-20 w-16 h-16 border border-primary/10 rounded-full"></div>
<div class="absolute top-20 right-40 w-32 h-32 border border-outline-variant/5 rotate-45 rounded-sm"></div>
</div>
</body></html>

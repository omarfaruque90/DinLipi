<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-sm {
            text-shadow: 0 0 10px rgba(186, 158, 255, 0.4);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060e20;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-tint": "#ba9eff",
                      "on-tertiary-fixed-variant": "#006544",
                      "surface-bright": "#1f2b49",
                      "inverse-surface": "#faf8ff",
                      "surface-container-low": "#091328",
                      "on-secondary-container": "#e2c5ff",
                      "error": "#ff6e84",
                      "primary-container": "#ae8dff",
                      "inverse-primary": "#6e3bd7",
                      "tertiary-fixed-dim": "#58e7ab",
                      "on-secondary-fixed": "#432564",
                      "secondary-fixed-dim": "#d9b5ff",
                      "surface-container-high": "#141f38",
                      "surface-container-highest": "#192540",
                      "primary-fixed-dim": "#a27cff",
                      "on-surface": "#dee5ff",
                      "on-error-container": "#ffb2b9",
                      "on-tertiary": "#006443",
                      "secondary-fixed": "#e3c6ff",
                      "inverse-on-surface": "#4d556b",
                      "on-tertiary-container": "#005a3c",
                      "secondary-container": "#573878",
                      "secondary": "#d6b2fc",
                      "on-primary-container": "#2b006e",
                      "surface-variant": "#192540",
                      "secondary-dim": "#c8a5ed",
                      "on-background": "#dee5ff",
                      "primary-dim": "#8455ef",
                      "on-secondary-fixed-variant": "#614283",
                      "on-primary-fixed-variant": "#370086",
                      "primary-fixed": "#ae8dff",
                      "primary": "#ba9eff",
                      "on-secondary": "#4c2e6d",
                      "background": "#060e20",
                      "on-surface-variant": "#a3aac4",
                      "outline-variant": "#40485d",
                      "tertiary-dim": "#58e7ab",
                      "error-dim": "#d73357",
                      "on-tertiary-fixed": "#00452d",
                      "on-primary": "#39008c",
                      "surface-container": "#0f1930",
                      "tertiary-fixed": "#69f6b8",
                      "error-container": "#a70138",
                      "on-error": "#490013",
                      "surface-container-lowest": "#000000",
                      "surface-dim": "#060e20",
                      "tertiary": "#9bffce",
                      "outline": "#6d758c",
                      "surface": "#060e20",
                      "tertiary-container": "#69f6b8",
                      "on-primary-fixed": "#000000"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar Shell Component -->
<header class="w-full top-0 sticky bg-[#060e20] z-50">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto bg-gradient-to-b from-[#060e20] to-transparent">
<div class="flex items-center gap-4">
<button class="hover:bg-[#ba9eff]/10 hover:backdrop-blur-md rounded-full transition-all p-2 active:scale-95 duration-200 ease-out text-[#ba9eff]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#ba9eff]">Security Access</h1>
</div>
<button class="hover:bg-[#ba9eff]/10 hover:backdrop-blur-md rounded-full transition-all p-2 active:scale-95 duration-200 ease-out text-[#ba9eff]">
<span class="material-symbols-outlined" data-icon="contact_support">contact_support</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Ambient Background Depth -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute top-0 right-0 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="max-w-md w-full z-10">
<!-- Header Editorial Authority -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center p-4 rounded-full bg-surface-container-high mb-6 shadow-[0_0_32px_rgba(186,158,255,0.06)] border border-outline-variant/15">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="shield_person">shield_person</span>
</div>
<h2 class="font-headline text-primary font-extrabold text-4xl tracking-tight mb-4">Reset Admin Access</h2>
<p class="font-body text-on-surface-variant text-base leading-relaxed max-w-xs mx-auto">
                    Enter your administrator email to receive a secure recovery token.
                </p>
</div>
<!-- Recovery Form -->
<div class="space-y-8">
<!-- Glassmorphic Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-highest/60 backdrop-blur-md border-0 py-5 pl-14 pr-6 rounded-lg text-on-surface placeholder:text-outline font-medium focus:ring-2 focus:ring-primary/30 transition-all outline-none" placeholder="Administrator Email" type="email"/>
<div class="absolute inset-0 rounded-lg border border-outline-variant/10 pointer-events-none"></div>
</div>
<!-- Primary Action -->
<div class="flex flex-col gap-6">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim py-5 rounded-xl text-on-primary-fixed font-bold text-lg flex items-center justify-center gap-3 shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined font-bold" data-icon="lock_reset">lock_reset</span>
                        Send Recovery Token
                    </button>
<!-- Secondary Actions Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface-bright/20 backdrop-blur-sm border border-outline-variant/10 py-4 px-2 rounded-xl text-on-surface-variant font-medium text-sm hover:bg-surface-bright/40 hover:text-on-surface transition-all active:scale-95 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xl mb-1" data-icon="support_agent">support_agent</span>
                            Contact Support
                        </button>
<button class="bg-surface-bright/20 backdrop-blur-sm border border-outline-variant/10 py-4 px-2 rounded-xl text-on-surface-variant font-medium text-sm hover:bg-surface-bright/40 hover:text-on-surface transition-all active:scale-95 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xl mb-1" data-icon="login">login</span>
                            Back to Login
                        </button>
</div>
</div>
</div>
<!-- High Security Indicator -->
<div class="mt-16 flex flex-col items-center gap-4">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low border border-outline-variant/15">
<span class="material-symbols-outlined text-tertiary text-[18px]" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold tracking-[0.1em] text-tertiary uppercase">AES-256 Encrypted Tunnel</span>
</div>
<div class="flex gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse"></div>
<div class="w-1.5 h-1.5 rounded-full bg-tertiary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-tertiary/20"></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Shell Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pt-4 pb-8 bg-[#0b1426]/70 backdrop-blur-[30px] rounded-t-[3rem] border-t border-[#40485d]/15 shadow-[0_-8px_32px_rgba(222,229,255,0.06)]">
<!-- Status Tab (Active Logic Mapping: Status fits the context of security/access) -->
<a class="flex flex-col items-center justify-center relative text-[#ba9eff] before:content-[''] before:absolute before:w-12 before:h-1 before:bg-[#ba9eff] before:top-0 before:rounded-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="verified_user">verified_user</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Status</span>
</a>
<!-- Support Tab -->
<a class="flex flex-col items-center justify-center text-[#dee5ff]/40 hover:text-[#ba9eff] transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="support_agent">support_agent</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Support</span>
</a>
<!-- Legal Tab -->
<a class="flex flex-col items-center justify-center text-[#dee5ff]/40 hover:text-[#ba9eff] transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="gavel">gavel</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Legal</span>
</a>
</nav>
<!-- Background Decorative Element: Abstract Security Pattern -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<div class="absolute inset-0" style="background-image: radial-gradient(#dee5ff 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "secondary-container": "#573878",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(31, 43, 73, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .glow-blob {
            filter: blur(80px);
            opacity: 0.35;
        }
        .premium-gradient {
            background: linear-gradient(135deg, #ba9eff 0%, #8455ef 100%);
        }
        .input-glass {
            background: rgba(25, 37, 64, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .input-glass:focus-within {
            border-color: rgba(186, 158, 255, 0.5);
            background: rgba(25, 37, 64, 0.6);
            box-shadow: 0 0 15px rgba(186, 158, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="glow-blob absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary-dim"></div>
<div class="glow-blob absolute top-[20%] -right-[5%] w-[40%] h-[40%] rounded-full bg-secondary-container"></div>
<div class="glow-blob absolute -bottom-[20%] left-[10%] w-[70%] h-[60%] rounded-full bg-on-secondary"></div>
</div>
<!-- Header -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-8">
<div class="text-2xl font-extrabold bg-gradient-to-r from-[#ba9eff] to-[#8455ef] bg-clip-text text-transparent font-headline tracking-tighter">
        Finzo
    </div>
<button class="w-11 h-11 flex items-center justify-center rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-primary text-xl">close</span>
</button>
</header>
<main class="relative z-10 min-h-screen flex items-center justify-center px-6 py-20">
<div class="w-full max-w-[480px]">
<div class="glass-card rounded-[2.5rem] p-8 md:p-12 border border-white/5">
<!-- Branding & Welcome -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 mb-8 premium-gradient shadow-2xl shadow-primary/30 rounded-full">
<span class="material-symbols-outlined text-4xl text-white" style='font-variation-settings: "FILL" 1;'>account_balance_wallet</span>
</div>
<h1 class="font-headline font-extrabold text-4xl leading-tight tracking-tight mb-3 text-white">
                    Welcome Back
                </h1>
<p class="text-on-surface-variant font-medium text-base">Sign in to manage your digital assets</p>
</div>
<!-- Login Form -->
<div class="space-y-6">
<!-- Input Fields -->
<div class="space-y-5">
<!-- Email Field -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-primary/80 mb-2.5 ml-5 uppercase tracking-widest">Email or Phone</label>
<div class="relative input-glass rounded-full flex items-center">
<span class="material-symbols-outlined ml-6 text-on-surface-variant/70 group-focus-within:text-primary transition-colors text-xl">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-4.5 px-4 text-on-surface placeholder:text-on-surface-variant/30 font-medium" placeholder="your@email.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="block text-[0.7rem] font-bold text-primary/80 mb-2.5 ml-5 uppercase tracking-widest">Password</label>
<div class="relative input-glass rounded-full flex items-center">
<span class="material-symbols-outlined ml-6 text-on-surface-variant/70 group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-4.5 px-4 text-on-surface placeholder:text-on-surface-variant/30 font-medium" placeholder="••••••••" type="password"/>
<button class="mr-6 text-on-surface-variant/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end px-2">
<button class="text-xs font-bold text-primary/80 hover:text-primary transition-colors uppercase tracking-wider">
                            Forgot Password?
                        </button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full premium-gradient text-on-primary-fixed font-headline font-extrabold text-lg py-5 shadow-2xl shadow-primary/25 hover:scale-[0.99] active:scale-[0.97] transition-all rounded-full">
                    Continue
                </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-px flex-1 bg-gradient-to-r from-transparent to-white/10"></div>
<span class="text-[0.65rem] font-black text-on-surface-variant/40 uppercase tracking-[0.2em]">Social login</span>
<div class="h-px flex-1 bg-gradient-to-l from-transparent to-white/10"></div>
</div>
<!-- Social Login -->
<button class="w-full font-bold py-4.5 flex items-center justify-center gap-3 transition-all rounded-full bg-white/5 border border-white/10 hover:bg-white/10 text-white/90">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAE8Bf2oee_tD_6bnfz8KcqIzStTgyQpVlMIhR02x6nc7kuT394Fa3uhROEWF3TQxhACj3H070ZdsgtRVKMAMsxlyMCcjbf6jZXNfcRp6O-senBuu4T-52GKeUCX9heMuSpcKcsdu6E6FR7_SUizq5HQtMkmpJ1gxWLL22ubS0L8wdc1t_JZXkDFlo4TsDy7tpGTLkfKURA8AuSLjB7igmPfMULF8TZZRTm6coqRQgbETabB4bKbZx1xivDf3C1FW_wyBGthpsRHSvE"/>
<span>Sign in with Google</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant font-medium text-sm">
                    New to Finzo? 
                    <a class="text-primary font-bold ml-1.5 hover:text-primary-container transition-colors underline decoration-primary/20 underline-offset-4" href="#">Create Account</a>
</p>
</div>
</div>
</div>
</main>
</body></html>

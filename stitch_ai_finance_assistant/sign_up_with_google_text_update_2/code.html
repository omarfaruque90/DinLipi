<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body {
            background-color: #060e20;
            color: #dee5ff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(31, 43, 73, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(132, 85, 239, 0.15) 0%, rgba(6, 14, 32, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative bg-surface">
<!-- Decorative Glows -->
<div class="glow-sphere top-[-100px] left-[-100px]"></div>
<div class="glow-sphere bottom-[-100px] right-[-100px]"></div>
<!-- Top App Bar (Shared Component Strategy) -->
<header class="flex items-center px-6 py-4 w-full h-16 top-0 fixed z-50">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#ba9eff]/10 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#ba9eff]">arrow_back</span>
</button>
<span class="text-[#ba9eff] font-['Plus_Jakarta_Sans'] font-extrabold tracking-tight text-xl uppercase">Finzo</span>
</div>
</header>
<main class="w-full max-w-md px-6 py-24 z-10 flex flex-col gap-8">
<!-- Header Text -->
<div class="flex flex-col gap-2">
<h1 class="text-4xl md:text-5xl font-plus-jakarta font-extrabold tracking-tight text-primary">
                Curate your <br/>future.
            </h1>
<p class="text-on-surface-variant font-body text-lg">
                Create a high-fidelity account to start your financial collection.
            </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant px-2">Full Name</label>
<div class="glass-card rounded-lg flex items-center px-4 py-1 focus-within:ring-2 focus-within:ring-primary/30 transition-all">
<span class="material-symbols-outlined text-primary/60 mr-3">person</span>
<input class="bg-transparent border-none w-full py-4 focus:ring-0 text-on-surface placeholder:text-outline/50 font-body" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant px-2">Email Address</label>
<div class="glass-card rounded-lg flex items-center px-4 py-1 focus-within:ring-2 focus-within:ring-primary/30 transition-all">
<span class="material-symbols-outlined text-primary/60 mr-3">mail</span>
<input class="bg-transparent border-none w-full py-4 focus:ring-0 text-on-surface placeholder:text-outline/50 font-body" placeholder="curator@finzo.io" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-2">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant px-2">Phone Number</label>
<div class="glass-card rounded-lg flex items-center px-4 py-1 focus-within:ring-2 focus-within:ring-primary/30 transition-all">
<span class="material-symbols-outlined text-primary/60 mr-3">phone</span>
<input class="bg-transparent border-none w-full py-4 focus:ring-0 text-on-surface placeholder:text-outline/50 font-body" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div><div class="flex flex-col gap-2">
<label class="text-label-sm uppercase tracking-widest text-on-surface-variant px-2">Password</label>
<div class="glass-card rounded-lg flex items-center px-4 py-1 focus-within:ring-2 focus-within:ring-primary/30 transition-all">
<span class="material-symbols-outlined text-primary/60 mr-3">lock</span>
<input class="bg-transparent border-none w-full py-4 focus:ring-0 text-on-surface placeholder:text-outline/50 font-body" placeholder="••••••••" type="password"/>
<button class="ml-2 p-2 hover:bg-white/5 rounded-full transition-colors" type="button">
<span class="material-symbols-outlined text-on-surface-variant">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="mt-4 bg-gradient-to-tr from-[#ba9eff] to-[#8455ef] text-white py-5 rounded-xl font-plus-jakarta font-bold text-lg shadow-[0_8px_32px_rgba(132,85,239,0.3)] active:scale-95 transition-transform duration-200">
                Create Account
            </button>
</form>
<!-- Alternative Options -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-label-sm uppercase tracking-widest text-on-surface-variant">Or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid gap-4 flex justify-center">
<button class="glass-card flex items-center justify-center gap-3 px-6 py-4 rounded-lg hover:bg-surface-bright/40 transition-colors border border-outline-variant/10">
<div class="w-5 h-5 flex items-center justify-center rounded-sm bg-white p-0.5">
<img alt="Google" class="w-full h-full" data-alt="Official Google G logo in multicolored branding style on a clean white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCL5hcyfWDUcvdi7x-Uon4xaWnOkC1jtTFubCbgOr4q8ke8OQVY7XTZYrvb1HJbJS_8u9AThbyPIzOKtJnDNc1e3d0nLcfkj0-u7cNDElbOtkV__uKt2L3f6mJcpd5xfi_B2PTRc5xIyOk-ghATVpoL69PbL3CDgRpN0kRNWuQDB1ZrhyLepTyIRgr_5Yh0wC7MnAqfXUXpLzZmDODY2o3gXJF5x5lKAL3WTFKBmp8Ow2mnITXCfJBTBndEA77CJ2y_al7hxZT2oAz"/>
</div>
<span class="font-body text-sm font-semibold">Sign up with Google</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center pt-4">
<p class="text-on-surface-variant font-body">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
</main>
<!-- Content Separation Logic (Tonal Transition instead of border) -->
<div class="fixed bottom-0 w-full h-24 bg-gradient-to-t from-surface to-transparent pointer-events-none"></div>
<!-- No BottomNavBar on Sign up screen as per Suppression Rules (Task-Focused) -->
</body></html>

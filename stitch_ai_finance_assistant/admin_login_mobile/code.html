<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060e20;
            overflow-x: hidden;
        }
        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(31, 43, 73, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-container": "#2b006e",
                      "tertiary-container": "#69f6b8",
                      "surface-container-high": "#141f38",
                      "on-background": "#dee5ff",
                      "surface-bright": "#1f2b49",
                      "on-primary-fixed": "#000000",
                      "surface-tint": "#ba9eff",
                      "primary-dim": "#8455ef",
                      "primary": "#ba9eff",
                      "tertiary": "#9bffce",
                      "surface-container": "#0f1930",
                      "on-tertiary-fixed-variant": "#006544",
                      "primary-container": "#ae8dff",
                      "on-primary": "#39008c",
                      "background": "#060e20",
                      "secondary-container": "#573878",
                      "primary-fixed": "#ae8dff",
                      "secondary-fixed-dim": "#d9b5ff",
                      "tertiary-dim": "#58e7ab",
                      "on-secondary-fixed-variant": "#614283",
                      "surface-dim": "#060e20",
                      "secondary": "#d6b2fc",
                      "on-error": "#490013",
                      "error-container": "#a70138",
                      "on-surface": "#dee5ff",
                      "inverse-on-surface": "#4d556b",
                      "tertiary-fixed": "#69f6b8",
                      "secondary-fixed": "#e3c6ff",
                      "on-tertiary-fixed": "#00452d",
                      "surface-variant": "#192540",
                      "on-tertiary-container": "#005a3c",
                      "surface-container-highest": "#192540",
                      "surface-container-lowest": "#000000",
                      "surface": "#060e20",
                      "on-error-container": "#ffb2b9",
                      "inverse-surface": "#faf8ff",
                      "outline": "#6d758c",
                      "error": "#ff6e84",
                      "on-surface-variant": "#a3aac4",
                      "tertiary-fixed-dim": "#58e7ab",
                      "on-secondary-fixed": "#432564",
                      "on-primary-fixed-variant": "#370086",
                      "primary-fixed-dim": "#a27cff",
                      "surface-container-low": "#091328",
                      "on-secondary-container": "#e2c5ff",
                      "outline-variant": "#40485d",
                      "inverse-primary": "#6e3bd7",
                      "secondary-dim": "#c8a5ed",
                      "on-tertiary": "#006443",
                      "on-secondary": "#4c2e6d",
                      "error-dim": "#d73357"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-6 text-on-surface">
<!-- Decorative Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[60%] h-[40%] bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary-dim/10 blur-[100px] rounded-full pointer-events-none"></div>
<!-- Main Login Container -->
<main class="w-full max-w-md z-10">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-primary-dim flex items-center justify-center shadow-[0_0_30px_rgba(186,158,255,0.3)] mb-6">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="shield_person" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<h1 class="text-primary font-headline font-black tracking-[0.2em] text-2xl uppercase">FINZO ADMIN</h1>
<p class="text-on-surface-variant font-label text-sm mt-2 tracking-widest uppercase opacity-60">System Access Gateway</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-card rounded-lg p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-on-surface-variant text-[10px] uppercase tracking-[0.15em] font-bold px-1">ADMINISTRATOR EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-highest border-none rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/30 transition-all outline-none font-body text-sm" placeholder="admin@finzo.system" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-on-surface-variant text-[10px] uppercase tracking-[0.15em] font-bold px-1">SECURE PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/30 transition-all outline-none font-body text-sm" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Authenticate Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary-fixed font-headline font-bold py-5 rounded-xl shadow-[0_10px_25px_rgba(132,85,239,0.3)] active:scale-95 transition-transform flex items-center justify-center gap-3 mt-8" type="submit">
<span class="material-symbols-outlined" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="tracking-wide">Authenticate</span>
</button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-12 flex flex-col items-center gap-4">
<a class="text-on-surface-variant text-xs hover:text-primary transition-colors flex items-center gap-2 font-medium" href="#">
<span class="material-symbols-outlined text-sm" data-icon="vpn_key">vpn_key</span>
                Forgot Admin Credentials?
            </a>
<div class="w-12 h-[1px] bg-outline-variant/20 my-2"></div>
<a class="text-on-surface-variant/60 text-xs hover:text-tertiary transition-colors flex items-center gap-2 font-medium" href="#">
<span class="material-symbols-outlined text-sm" data-icon="support_agent">support_agent</span>
                System Support
            </a>
</div>
</main>
<!-- Support Navigation (Bottom) -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-8 pb-4 bg-[#0d162d]/70 backdrop-blur-[30px] rounded-t-[3rem] z-50">
<a class="flex items-center justify-center text-[#dee5ff]/40 p-3 hover:text-[#ba9eff] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</a>
<a class="flex items-center justify-center bg-gradient-to-br from-[#ba9eff] to-[#8455ef] text-white rounded-full p-3 shadow-[0_0_15px_rgba(132,85,239,0.5)]" href="#">
<span class="material-symbols-outlined" data-icon="vpn_key">vpn_key</span>
</a>
<a class="flex items-center justify-center text-[#dee5ff]/40 p-3 hover:text-[#ba9eff] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="info">info</span>
</a>
</nav>
<!-- Security Badge -->
<div class="fixed top-8 right-8 hidden sm:flex items-center gap-2 bg-surface-container-low/40 backdrop-blur-md px-4 py-2 rounded-full border border-outline-variant/10">
<div class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></div>
<span class="text-[10px] font-headline font-bold text-on-surface-variant uppercase tracking-widest">Nodes Active</span>
</div>
</body></html>

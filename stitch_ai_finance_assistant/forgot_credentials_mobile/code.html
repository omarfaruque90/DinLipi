<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(31, 43, 73, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-between overflow-x-hidden">
<!-- TopAppBar Navigation Shell -->
<header class="w-full top-0 sticky bg-gradient-to-b from-[#060e20] to-transparent z-50">
<div class="flex items-center px-6 h-16 w-full max-w-none">
<button class="text-[#ba9eff] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="ml-4 font-['Plus_Jakarta_Sans'] text-xl font-semibold text-[#ba9eff]">Recovery</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 w-full max-w-md relative">
<!-- Background Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Recovery Illustration -->
<div class="mb-10 relative">
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary/30 to-primary-dim/10 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 blur-xl"></div>
<span class="material-symbols-outlined text-5xl text-primary" data-icon="key">key</span>
</div>
<!-- Decorative ring -->
<div class="absolute -inset-2 border border-primary/10 rounded-full animate-pulse"></div>
</div>
<!-- Heading Section -->
<div class="text-center mb-12">
<h1 class="font-headline text-3xl font-extrabold text-on-surface mb-4 tracking-tight">Forgot Credentials?</h1>
<p class="text-on-surface-variant text-md leading-relaxed max-w-[260px] mx-auto">
                Enter your email or phone number to receive a recovery link.
            </p>
</div>
<!-- Input Section -->
<div class="w-full space-y-6">
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-highest border-none h-16 pl-14 pr-6 rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/30 transition-all font-medium" placeholder="Email or Phone Number" type="text"/>
</div>
<button class="w-full h-16 rounded-xl bg-gradient-to-br from-primary to-primary-dim text-on-primary-fixed font-bold text-lg flex items-center justify-center gap-3 shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-200">
                Send Recovery Link
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-12 mb-8">
<a class="text-primary font-semibold flex items-center gap-2 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back_ios">arrow_back_ios</span>
                Back to Login
            </a>
</div>
</main>
<!-- Bottom Navigation Component (Suppressed per task context of focused recovery screen) -->
<!-- As per instructions: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional... recovery link" -->
<!-- Placeholder for visual depth at the bottom -->
<div class="w-full h-2 bg-gradient-to-t from-primary/5 to-transparent"></div>
</body></html>

                            check_circle
                        </span>
</div>
</div>
</div>

<h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight text-on-surface leading-tight">

<p class="font-body text-on-surface-variant leading-relaxed text-base md:text-lg max-w-[320px] mx-auto">

                </p>
</div>
<!-- Interactive Zone -->
<div class="w-full pt-4 space-y-8">
<button class="w-full py-5 px-8 rounded-xl bg-gradient-to-r from-primary to-primary-dim text-on-primary-fixed font-headline font-bold text-lg shadow-xl shadow-primary/20 hover:opacity-90 active:scale-[0.96] transition-all duration-300">

<div class="flex flex-col items-center gap-4">
<p class="font-label text-on-surface-variant/60 uppercase tracking-[0.2em] text-[10px]">

<div class="w-1.5 h-1.5 rounded-full bg-primary/10"></div>
</div>
</div>

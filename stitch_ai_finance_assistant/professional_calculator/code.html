<p class="text-on-surface-variant/60 font-body text-xl tracking-tight mb-2">2,450.00 + 1,120.50</p>

<h2 class="text-on-surface font-headline font-extrabold text-6xl tracking-tighter">3,570.50</h2>
</div>
</div>
</section>

<span class="material-symbols-outlined text-2xl" data-icon="add_card">add_card</span>

<div class="text-left">

<div class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 group-hover:bg-white/10">

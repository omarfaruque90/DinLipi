<!-- TopAppBar -->

<main class="flex-1 flex flex-col items-center justify-center px-6 pb-24 relative">

<div class="absolute bottom-1/4 right-0 w-48 h-48 bg-secondary/10 blur-[100px] rounded-full -z-10"></div>

<div class="w-full max-w-md flex flex-col gap-8">

<h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Verify Identity</h2>
<p class="text-on-surface-variant text-sm px-8 leading-relaxed">
                    A high-security 6-digit code has been sent to your registered admin device.
                </p>
</div>
<!-- OTP Input Card -->
<div class="glass-panel rounded-lg p-8 shadow-2xl border border-white/5 space-y-8">
<!-- Code Inputs -->
<div class="flex justify-between gap-2">
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-container-high border-none rounded-md text-primary focus:ring-2 focus:ring-primary/30 transition-all placeholder:opacity-20" maxlength="1" placeholder="0" type="text"/>
</div>

                    Verify &amp; Continue
                </button>
<!-- Resend Logic -->
<div class="text-center">
<p class="text-on-surface-variant text-sm font-medium">
                        Didn't receive the code? 
                        <span class="text-primary cursor-pointer hover:underline block mt-1">Resend Code (01:54)</span>
</p>
</div>
</div>

<div class="flex items-center justify-center gap-6 mt-4">
<div class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-[14px] text-tertiary">lock</span>

</div>
